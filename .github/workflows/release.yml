name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build and Release
    runs-on: macos-14
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize version
        run: |
          VERSION_STRIPPED="${VERSION#v}"
          echo "VERSION=${VERSION_STRIPPED}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: brew install create-dmg

      - name: Verify capability checklist evidence
        run: ./scripts/verify-capability-checklist.sh

      - name: Verify release-note claim evidence map
        run: ./scripts/verify-release-note-evidence.sh

      - name: Validate release prerequisites
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.MACOS_CODE_SIGN_IDENTITY }}
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          test -n "${CODE_SIGN_IDENTITY}" || { echo "Missing secret: MACOS_CODE_SIGN_IDENTITY"; exit 1; }
          test -n "${DEVELOPMENT_TEAM}" || { echo "Missing secret: APPLE_TEAM_ID"; exit 1; }
          test -x "./bin/sign_update" || { echo "Missing executable: ./bin/sign_update"; exit 1; }

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "${CERTIFICATE_BASE64}" || { echo "Missing secret: APPLE_CERTIFICATE_BASE64"; exit 1; }
          test -n "${CERTIFICATE_PASSWORD}" || { echo "Missing secret: APPLE_CERTIFICATE_PASSWORD"; exit 1; }

          echo "${CERTIFICATE_BASE64}" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "${CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          security list-keychains -d user -s build.keychain login.keychain

      - name: Build archive
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.MACOS_CODE_SIGN_IDENTITY }}
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild -project rawctl.xcodeproj \
            -scheme latent-direct \
            -configuration Release \
            -archivePath latent.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="${CODE_SIGN_IDENTITY}" \
            DEVELOPMENT_TEAM="${DEVELOPMENT_TEAM}" \
            MARKETING_VERSION="${VERSION}"

      - name: Export archive
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath latent.xcarchive \
            -exportOptionsPlist scripts/ExportOptions.plist \
            -exportPath ./export

      - name: Create release DMG
        run: |
          set -euo pipefail
          APP_PATH="$(find ./export -maxdepth 1 -name '*.app' | head -n1)"
          test -n "${APP_PATH}" || { echo "Exported .app not found"; exit 1; }
          APP_NAME="$(basename "${APP_PATH}")"

          create-dmg \
            --volname "Latent Installer" \
            --volicon "rawctl/Assets.xcassets/AppIcon.appiconset/icon_512x512.png" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "${APP_NAME}" 200 190 \
            --hide-extension "${APP_NAME}" \
            --app-drop-link 600 185 \
            "latent-${VERSION}.dmg" \
            "${APP_PATH}"

          mkdir -p releases
          mv "latent-${VERSION}.dmg" "releases/latent-${VERSION}.dmg"
          shasum -a 256 "releases/latent-${VERSION}.dmg" > "releases/latent-${VERSION}.dmg.sha256"

      - name: Notarize and staple DMG
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          test -n "${NOTARIZATION_APPLE_ID}" || { echo "Missing secret: NOTARIZATION_APPLE_ID"; exit 1; }
          test -n "${NOTARIZATION_PASSWORD}" || { echo "Missing secret: NOTARIZATION_PASSWORD"; exit 1; }
          test -n "${TEAM_ID}" || { echo "Missing secret: APPLE_TEAM_ID"; exit 1; }

          xcrun notarytool submit "releases/latent-${VERSION}.dmg" \
            --apple-id "${NOTARIZATION_APPLE_ID}" \
            --password "${NOTARIZATION_PASSWORD}" \
            --team-id "${TEAM_ID}" \
            --wait
          xcrun stapler staple "releases/latent-${VERSION}.dmg"

      - name: Generate Sparkle signature (assertive)
        id: sparkle_sign
        run: |
          set -euo pipefail
          SIGNATURE="$(./bin/sign_update "releases/latent-${VERSION}.dmg" 2>&1 | perl -ne 'print "$1\n" if /sparkle:edSignature=\"([^\"]+)\"/')"
          test -n "${SIGNATURE}" || { echo "Failed to generate Sparkle signature"; exit 1; }
          echo "signature=${SIGNATURE}" >> "$GITHUB_OUTPUT"

      - name: Update appcast and validate
        run: |
          set -euo pipefail
          ./scripts/update-appcast.sh "${VERSION}"
          test -f "releases/appcast.xml" || { echo "appcast.xml was not generated"; exit 1; }
          grep -q "sparkle:edSignature=" "releases/appcast.xml" || { echo "Missing sparkle signature in appcast"; exit 1; }
          grep -q "latent-${VERSION}.dmg" "releases/appcast.xml" || { echo "Missing DMG reference in appcast"; exit 1; }
          grep -q "sparkle:shortVersionString=\"${VERSION}\"" "releases/appcast.xml" || { echo "Missing shortVersionString in appcast"; exit 1; }

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            releases/latent-${{ env.VERSION }}.dmg
            releases/latent-${{ env.VERSION }}.dmg.sha256
            releases/appcast.xml
          generate_release_notes: true

      - name: Upload artifacts to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          test -n "${R2_ACCOUNT_ID}" || { echo "Missing secret: R2_ACCOUNT_ID"; exit 1; }
          test -n "${R2_ACCESS_KEY_ID}" || { echo "Missing secret: R2_ACCESS_KEY_ID"; exit 1; }
          test -n "${R2_SECRET_ACCESS_KEY}" || { echo "Missing secret: R2_SECRET_ACCESS_KEY"; exit 1; }
          test -n "${R2_BUCKET}" || { echo "Missing secret: R2_BUCKET"; exit 1; }

          aws configure set aws_access_key_id "${R2_ACCESS_KEY_ID}"
          aws configure set aws_secret_access_key "${R2_SECRET_ACCESS_KEY}"
          aws configure set default.region auto
          ENDPOINT_URL="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 cp "releases/latent-${VERSION}.dmg" "s3://${R2_BUCKET}/latent-${VERSION}.dmg" --endpoint-url "${ENDPOINT_URL}"
          aws s3 cp "releases/latent-${VERSION}.dmg" "s3://${R2_BUCKET}/latent-latest.dmg" --endpoint-url "${ENDPOINT_URL}"
          aws s3 cp "releases/appcast.xml" "s3://${R2_BUCKET}/appcast.xml" --endpoint-url "${ENDPOINT_URL}"
